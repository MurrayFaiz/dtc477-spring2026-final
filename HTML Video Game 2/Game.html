<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Game Layout</title>

    <style>
        /* ------------------------------
   GLOBAL PAGE LAYOUT
--------------------------------*/
        body {
            margin: 0;
            padding: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ------------------------------
   CABINET BACKGROUND (#game-area)
--------------------------------*/
        #game-area {
            position: relative;
            height: 99vh;
            background: white;
            border: 3px solid lightgray;
            box-sizing: border-box;
            display: inline-block;
            overflow: hidden;

            opacity: 0;
            border-radius: 12px;
            transform: perspective(900px) translateZ(0) rotateX(1deg);
            filter: brightness(1.05) contrast(1.15);

            animation: gameFadeIn 1s ease forwards;
        }

        @keyframes gameFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* CRT scanlines + flicker */
        #game-area::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.08) 0px,
                    rgba(0, 0, 0, 0.08) 2px,
                    transparent 2px,
                    transparent 4px);
            opacity: 0.18;
            mix-blend-mode: multiply;
            z-index: 3;
            animation: crtFlicker 0.2s infinite 1s;
        }

        /* CRT glow */
        #game-area::before {
            content: "";
            position: absolute;
            inset: -10%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 2;
        }

        @keyframes crtFlicker {

            0%,
            100% {
                opacity: 0.18;
            }

            50% {
                opacity: 0.15;
            }
        }

        /* Cabinet screen image */
        #game-image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        /* Cabinet overlay items */
        #overlay-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 4;
        }

        .small-item {
            position: absolute;
            height: 100px;
            transform-origin: center;
        }

        /* Button bump animation */
        @keyframes bump {
            0% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(5px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .bump-animate {
            animation: bump 0.3s ease-out;
        }

        /* Joystick tilt animations */
        @keyframes tiltLeft {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(-15deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        @keyframes tiltRight {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(15deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        .tilt-left {
            animation: tiltLeft 0.25s ease-out;
        }

        .tilt-right {
            animation: tiltRight 0.25s ease-out;
        }

        /* Fade-out overlay */
        #fadeOut {
            position: absolute;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 999;
        }

        #fadeOut.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Main Menu Button */
        #homeBtn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 90px;
            height: 35px;
            background: #222;
            color: white;
            border: 2px solid #555;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            z-index: 50;
            pointer-events: auto;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        #homeBtn:hover {
            transform: scale(1.08);
            background: #333;
        }

        /* ------------------------------
   FLOATING GAME CRT SCREEN
--------------------------------*/
        #gameWrapper {
            position: absolute;
            top: 40%;
            left: 51%;
            width: 650px;
            /* easy to adjust */
            height: 500px;
            /* easy to adjust */

            transform:
                translate(-50%, -50%) perspective(500px) rotateX(4deg)
                /* rotateY(-4deg) */
                scale(0.98);

            border-radius: 22px;
            overflow: hidden;
            z-index: 10;

            opacity: 0;
            animation: wrapperFadeIn 1s ease forwards;

            box-shadow:
                inset 0 0 40px rgba(255, 255, 255, 0.08),
                inset 0 0 120px rgba(0, 0, 0, 0.6),
                0 0 25px rgba(0, 0, 0, 0.8);
        }

        @keyframes wrapperFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* CRT bubble mask */
        #gameWrapper::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;

            background: radial-gradient(circle at center,
                    rgba(255, 255, 255, 0.05) 0%,
                    rgba(255, 255, 255, 0.02) 35%,
                    rgba(0, 0, 0, 0.25) 100%);

            z-index: 20;
        }

        /* ------------------------------
   GAME CANVAS (kept flat)
--------------------------------*/
        #gameCanvas {
            width: 100%;
            height: 100%;
            background: rgb(161, 68, 68);
            display: block;
            image-rendering: pixelated;
            border-radius: 0;
            /* wrapper handles curvature */
        }

        /* ------------------------------
   START OVERLAY
--------------------------------*/
        #startOverlay {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            z-index: 30;
        }

        #startButton {
            padding: 15px 35px;
            font-size: 22px;
            background: #222;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        #startButton:hover {
            background: #333;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <!-- Floating Game Layer -->
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="650" height="500"></canvas>

        <div id="startOverlay">
            <button id="startButton">Start Game</button>
        </div>
    </div>

    <div id="game-area">

        <!-- Fade-out overlay -->
        <div id="fadeOut"></div>

        <img id="game-image" src="assets/images/Zoomed In Screen.png" alt="">

        <div id="overlay-layer">
            <img id="btnA" class="small-item" src="assets/images/Button.png" style="top: 800px; left: 500px;"
                alt="arcade buttons">
            <img id="rightStick" class="small-item" src="assets/images/RightStick.png" style="top: 700px; left: 795px;"
                alt="right game joystick">
            <img id="leftStick" class="small-item" src="assets/images/LeftStick.png" style="top: 700px; left: 465px;"
                alt="left game joystick">
        </div>

        <!-- Main Menu Button -->
        <button id="homeBtn">Main Menu</button>

    </div>

    <script>
        /* Key → image mapping */
        const keyBindings = {
            a: "btnA",
            ArrowRight: "rightStick",
            ArrowLeft: "leftStick"
        };

        /* Bump animation */
        function animateItem(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("bump-animate");
            void el.offsetWidth;
            el.classList.add("bump-animate");
        }

        /* Joystick tilt animation */
        function tiltStick(id, direction) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("tilt-left", "tilt-right");
            void el.offsetWidth;
            el.classList.add(direction === "left" ? "tilt-left" : "tilt-right");
        }

        /* Fade-out + redirect */
        function returnToMenu() {
            const fade = document.getElementById("fadeOut");
            fade.classList.add("active");
            setTimeout(() => {
                window.location.href = "index.html";
            }, 600);
        }

        /* Button click triggers fade-out */
        document.getElementById("homeBtn").addEventListener("click", returnToMenu);

        /* ESC key returns to menu */
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                returnToMenu();
            }

            // Existing key animations
            const id = keyBindings[e.key];
            if (id) animateItem(id);

            if (e.key === "ArrowLeft") tiltStick("leftStick", "left");
            if (e.key === "ArrowRight") tiltStick("rightStick", "right");
        });
    </script>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const bgImage = new Image();
        bgImage.src = "assets/images/background.png";
    </script>

    <script src="scripts/playerScript.js"></script>
    <script src="scripts/enemyScript.js"></script>
    <script src="scripts/collisionsScript.js"></script>
    <script src="scripts/bossScript.js"></script>
    <script src="scripts/runGameLoop.js"></script>

</body>

</html>
