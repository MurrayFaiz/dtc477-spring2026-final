<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Game Layout</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* CRT EFFECTS + FADE-IN (no flicker here) */
        #game-area {
            position: relative;
            height: 99vh;
            background: white;
            border: 3px solid lightgray;
            box-sizing: border-box;
            display: inline-block;
            overflow: hidden;

            /* Start fully transparent for fade-in */
            opacity: 0;

            /* CRT curvature */
            border-radius: 12px;
            transform: perspective(900px) translateZ(0) rotateX(1deg);

            /* CRT glow + contrast */
            filter: brightness(1.05) contrast(1.15);

            /* Only fade-in here */
            animation: gameFadeIn 1s ease forwards;
        }

        /* Fade-in animation */
        @keyframes gameFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* CRT Scanlines + FLICKER lives here now */
        #game-area::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0,0,0,0.08) 0px,
                rgba(0,0,0,0.08) 2px,
                transparent 2px,
                transparent 4px
            );
            opacity: 0.18;
            mix-blend-mode: multiply;
            z-index: 3;

            /* Flicker only on the overlay */
            animation: crtFlicker 0.2s infinite 1s;
        }

        /* CRT Glow */
        #game-area::before {
            content: "";
            position: absolute;
            inset: -10%;
            background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
            pointer-events: none;
            z-index: 2;
        }

        /* Flicker (reduced intensity) */
        @keyframes crtFlicker {
            0%, 100% { opacity: 0.18; }
            50% { opacity: 0.15; }
        }

        #game-image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        #overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }

        .small-item {
            position: absolute;
            height: 100px;
            transform-origin: center;
        }

        /* Bump animation */
        @keyframes bump {
            0%   { transform: translateY(0); }
            30%  { transform: translateY(-10px); }
            60%  { transform: translateY(5px); }
            100% { transform: translateY(0); }
        }
        .bump-animate {
            animation: bump 0.3s ease-out;
        }

        /* Joystick tilt animations */
        @keyframes tiltLeft {
            0%   { transform: rotate(0deg); }
            50%  { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes tiltRight {
            0%   { transform: rotate(0deg); }
            50%  { transform: rotate(15deg); }
            100% { transform: rotate(0deg); }
        }
        .tilt-left { animation: tiltLeft 0.25s ease-out; }
        .tilt-right { animation: tiltRight 0.25s ease-out; }

        /* Fade-out overlay */
        #fadeOut {
            position: absolute;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 999;
        }

        #fadeOut.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Main Menu Button */
        #homeBtn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 90px;
            height: 35px;
            background: #222;
            color: white;
            border: 2px solid #555;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            z-index: 50;
            pointer-events: auto;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        #homeBtn:hover {
            transform: scale(1.08);
            background: #333;
        }
    </style>
</head>

<body>

    <div id="game-area">

        <!-- Fade-out overlay -->
        <div id="fadeOut"></div>

        <img id="game-image" src="Images/Zoomed In Screen.png" alt="">

        <div id="overlay-layer">
            <img id="btnA" class="small-item" src="Images/Button.png" style="top: 300px; left: 500px;">
            <img id="rightStick" class="small-item" src="Images/RightStick.png" style="top: 500px; left: 795px;">
            <img id="leftStick" class="small-item" src="Images/LeftStick.png" style="top: 500px; left: 465px;">
        </div>

        <!-- Main Menu Button -->
        <button id="homeBtn">Main Menu</button>

    </div>

    <script>
        /* Key → image mapping */
        const keyBindings = {
            a: "btnA",
            ArrowRight: "rightStick",
            ArrowLeft: "leftStick"
        };

        /* Bump animation */
        function animateItem(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("bump-animate");
            void el.offsetWidth;
            el.classList.add("bump-animate");
        }

        /* Joystick tilt animation */
        function tiltStick(id, direction) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("tilt-left", "tilt-right");
            void el.offsetWidth;
            el.classList.add(direction === "left" ? "tilt-left" : "tilt-right");
        }

        /* Fade-out + redirect */
        function returnToMenu() {
            const fade = document.getElementById("fadeOut");
            fade.classList.add("active");
            setTimeout(() => {
                window.location.href = "index.html";
            }, 600);
        }

        /* Button click triggers fade-out */
        document.getElementById("homeBtn").addEventListener("click", returnToMenu);

        /* ESC key returns to menu */
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                returnToMenu();
            }

            // Existing key animations
            const id = keyBindings[e.key];
            if (id) animateItem(id);

            if (e.key === "ArrowLeft") tiltStick("leftStick", "left");
            if (e.key === "ArrowRight") tiltStick("rightStick", "right");
        });
    </script>

</body>
</html>
