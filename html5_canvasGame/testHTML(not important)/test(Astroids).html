<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Simple Asteroids</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            overflow: hidden;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: black;
        }
    </style>
</head>

<body>
    <canvas id="game" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const keys = {};
        document.addEventListener("keydown", e => keys[e.code] = true);
        document.addEventListener("keyup", e => keys[e.code] = false);

        const ship = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            angle: 0,
            vx: 0,
            vy: 0,
            thrust: 0.08,
            friction: 0.99,
            radius: 12
        };

        let bullets = [];
        let asteroids = [];

        function spawnAsteroid() {
            const edge = Math.random() < 0.5 ? "x" : "y";
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            if (edge === "x") x = Math.random() < 0.5 ? 0 : canvas.width;
            else y = Math.random() < 0.5 ? 0 : canvas.height;

            const angle = Math.random() * Math.PI * 2;
            const speed = 0.5 + Math.random() * 1.5;
            asteroids.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: 20 + Math.random() * 20
            });
        }

        for (let i = 0; i < 6; i++) spawnAsteroid();

        function shoot() {
            const speed = 5;
            bullets.push({
                x: ship.x + Math.cos(ship.angle) * ship.radius,
                y: ship.y + Math.sin(ship.angle) * ship.radius,
                vx: Math.cos(ship.angle) * speed,
                vy: Math.sin(ship.angle) * speed,
                life: 60
            });
        }

        let canShoot = true;
        document.addEventListener("keydown", e => {
            if (e.code === "Space" && canShoot) {
                shoot();
                canShoot = false;
            }
        });
        document.addEventListener("keyup", e => {
            if (e.code === "Space") canShoot = true;
        });

        function wrap(obj) {
            if (obj.x < 0) obj.x += canvas.width;
            if (obj.x > canvas.width) obj.x -= canvas.width;
            if (obj.y < 0) obj.y += canvas.height;
            if (obj.y > canvas.height) obj.y -= canvas.height;
        }

        function updateShip() {
            if (keys["ArrowLeft"]) ship.angle -= 0.06;
            if (keys["ArrowRight"]) ship.angle += 0.06;

            if (keys["ArrowUp"]) {
                ship.vx += Math.cos(ship.angle) * ship.thrust;
                ship.vy += Math.sin(ship.angle) * ship.thrust;
            }

            ship.vx *= ship.friction;
            ship.vy *= ship.friction;

            ship.x += ship.vx;
            ship.y += ship.vy;
            wrap(ship);
        }

        function updateBullets() {
            bullets.forEach(b => {
                b.x += b.vx;
                b.y += b.vy;
                wrap(b);
                b.life--;
            });
            bullets = bullets.filter(b => b.life > 0);
        }

        function updateAsteroids() {
            asteroids.forEach(a => {
                a.x += a.vx;
                a.y += a.vy;
                wrap(a);
            });
        }

        function checkCollisions() {
            bullets.forEach((b, bi) => {
                asteroids.forEach((a, ai) => {
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < a.radius) {
                        bullets.splice(bi, 1);
                        asteroids.splice(ai, 1);
                        if (a.radius > 18) {
                            for (let i = 0; i < 2; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const speed = 1 + Math.random();
                                asteroids.push({
                                    x: a.x,
                                    y: a.y,
                                    vx: Math.cos(angle) * speed,
                                    vy: Math.sin(angle) * speed,
                                    radius: a.radius * 0.6
                                });
                            }
                        }
                    }
                });
            });
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(ship.radius, 0);
            ctx.lineTo(-ship.radius, -ship.radius * 0.7);
            ctx.lineTo(-ship.radius * 0.4, 0);
            ctx.lineTo(-ship.radius, ship.radius * 0.7);
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
        }

        function drawBullets() {
            ctx.fillStyle = "white";
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawAsteroids() {
            ctx.strokeStyle = "gray";
            ctx.lineWidth = 2;
            asteroids.forEach(a => {
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                ctx.stroke();
            });
        }

        function loop() {
            updateShip();
            updateBullets();
            updateAsteroids();
            checkCollisions();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawShip();
            drawBullets();
            drawAsteroids();

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>

</html>
