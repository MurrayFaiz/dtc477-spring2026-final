<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sci-Fi Quiz</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/gameAssets/level.css">
</head>

<body>
    <canvas id="spaceStage" width="800" height="600"></canvas>
    <script src="/gameScripts/playerScript.js" crossorigin="anonymous"></script>
    <script>
        let asteroids = [];

        function spawnAsteroid() {
            const edge = Math.random() < 0.5 ? "x" : "y";
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            if (edge === "x") x = Math.random() < 0.5 ? 0 : canvas.width;
            else y = Math.random() < 0.5 ? 0 : canvas.height;

            const angle = Math.random() * Math.PI * 2;
            const speed = 0.5 + Math.random() * 1.5;
            asteroids.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: 20 + Math.random() * 20
            });
        }

        function wrap(obj) {
            if (obj.x < 0) obj.x += canvas.width;
            if (obj.x > canvas.width) obj.x -= canvas.width;
            if (obj.y < 0) obj.y += canvas.height;
            if (obj.y > canvas.height) obj.y -= canvas.height;
        }

        function updateAsteroids() {
            asteroids.forEach(a => {
                a.x += a.vx;
                a.y += a.vy;
                wrap(a);
            });
        }

        function checkCollisions() {
            bullets.forEach((b, bi) => {
                asteroids.forEach((a, ai) => {
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < a.radius) {
                        bullets.splice(bi, 1);
                        asteroids.splice(ai, 1);
                        if (a.radius > 18) {
                            for (let i = 0; i < 2; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const speed = 1 + Math.random();
                                asteroids.push({
                                    x: a.x,
                                    y: a.y,
                                    vx: Math.cos(angle) * speed,
                                    vy: Math.sin(angle) * speed,
                                    radius: a.radius * 0.6
                                });
                            }
                        }
                    }
                });
            });
        }

        function drawAsteroids() {
            ctx.strokeStyle = "gray";
            ctx.lineWidth = 2;
            asteroids.forEach(a => {
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                ctx.stroke();
            });
        }

        function loop() {
            updateAsteroids();
            checkCollisions();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawAsteroids();

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>

</html>
